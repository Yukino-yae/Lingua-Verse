<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万语集 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('retouch_2026042121345469.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
        }

        .glow-layer-1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(
                circle 600px at var(--x, 50%) var(--y, 50%),
                rgba(255, 150, 130, 0.15),
                transparent 50%
            );
        }

        .glow-layer-2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                circle 300px at var(--x, 50%) var(--y, 50%),
                rgba(255, 150, 130, 0.1),
                transparent 40%
            );
        }

        .glow-layer-3 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(
                circle 150px at var(--x, 50%) var(--y, 50%),
                rgba(255, 255, 255, 0.08),
                transparent 30%
            );
        }

        .register-wrap {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card-group {
            width: 450px;
            padding: 40px;
            background: rgba(255, 182, 163, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 182, 163, 0.4);
            overflow: hidden;
        }

        .register-card-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: radial-gradient(
                400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 150, 130, 0.5),
                transparent 40%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .register-card-group:hover::before {
            opacity: 1;
        }

        .register-title-main {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 0px;
            line-height: 47.74px;
            color: rgba(180, 80, 60, 1);
            margin-bottom: 12px;
        }

        .register-title-sub {
            font-size: 30px;
            font-weight: 300;
            line-height: 39.78px;
            color: rgba(200, 100, 80, 1);
            margin-bottom: 40px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 300;
            line-height: 21.22px;
            color: rgba(60, 60, 60, 0.85);
            display: block;
            margin-bottom: 8px;
        }

        .register-input {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 182, 163, 0.5);
            border-radius: 5px;
            outline: none;
            padding: 0 16px;
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .register-input::placeholder {
            color: rgba(60, 60, 60, 0.5);
        }

        .register-input:focus {
            border-color: rgba(255, 150, 130, 0.8);
            box-shadow: 0 0 20px rgba(255, 150, 130, 0.3);
        }

        .form-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .agreement-box-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .agreement-checkbox {
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 182, 163, 0.5);
            cursor: pointer;
            accent-color: #ff9682;
        }

        .agreement-text {
            font-size: 14px;
            color: rgba(60, 60, 60, 0.7);
        }

        .agreement-text a {
            color: rgba(180, 80, 60, 0.8);
            text-decoration: none;
        }

        .agreement-text a:hover {
            color: rgba(180, 80, 60, 1);
        }

        .register-btn {
            position: relative;
            width: 100%;
            height: 52px;
            border-radius: 5px;
            border: none;
            background: linear-gradient(135deg, #ff9682, #ffb6a3);
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 255, 255, 0.2),
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .register-btn:hover::before {
            opacity: 1;
        }

        .register-btn:hover {
            background: linear-gradient(135deg, #ffa694, #ffc6b3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 150, 130, 0.4);
        }

        .login-link {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: rgba(60, 60, 60, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-link:hover {
            color: rgba(180, 80, 60, 1);
        }

        .cursor-glow {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255, 150, 130, 1), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        body:hover .cursor-glow {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .register-card-group {
                margin: 50px 20px;
                width: 90%;
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="glow-layer-1"></div>
    <div class="glow-layer-2"></div>
    <div class="glow-layer-3"></div>
    <div class="cursor-glow"></div>

    <div class="register-wrap">
        <div class="register-card-group">
            <h1 class="register-title-main">CREATE YOUR ACCOUNT</h1>
            <h2 class="register-title-sub">加入万语集</h2>

            <label class="form-label">手机号</label>
            <input class="register-input" type="tel" placeholder="请输入手机号">

            <label class="form-label">用户名</label>
            <input class="register-input" type="text" placeholder="请输入用户名">

            <label class="form-label">设置密码</label>
            <input class="register-input" type="password" placeholder="请设置密码（6-20位）">

            <label class="form-label">确认密码</label>
            <input class="register-input" type="password" placeholder="请再次输入密码">

            <div class="form-bottom-row">
                <div class="agreement-box-wrap">
                    <input type="checkbox" class="agreement-checkbox" id="agreement">
                    <label class="agreement-text" for="agreement">我已阅读并同意<a href="#">《用户协议》</a></label>
                </div>
            </div>

            <button class="register-btn">立即注册</button>

            <a href="login-page.html" class="login-link">已有账号？去登录→</a>
        </div>
    </div>

    <script>
        const glowLayers = document.querySelectorAll('.glow-layer-1, .glow-layer-2, .glow-layer-3');
        const registerCard = document.querySelector('.register-card-group');
        const registerBtn = document.querySelector('.register-btn');
        const cursorGlow = document.querySelector('.cursor-glow');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            glowLayers.forEach(layer => {
                layer.style.setProperty('--x', `${x}px`);
                layer.style.setProperty('--y', `${y}px`);
            });

            cursorGlow.style.left = `${x}px`;
            cursorGlow.style.top = `${y}px`;
        });

        registerCard.addEventListener('mousemove', (e) => {
            const rect = registerCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            registerCard.style.setProperty('--mouse-x', `${x}px`);
            registerCard.style.setProperty('--mouse-y', `${y}px`);
        });

        registerBtn.addEventListener('mousemove', (e) => {
            const rect = registerBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            registerBtn.style.setProperty('--mouse-x', `${x}px`);
            registerBtn.style.setProperty('--mouse-y', `${y}px`);
        });
    </script>
</body>
</html>
