<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万语集 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('retouch_2026042115290130.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
        }

        .glow-layer-1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(
                circle 600px at var(--x, 50%) var(--y, 50%),
                rgba(30, 150, 140, 0.15),
                transparent 50%
            );
        }

        .glow-layer-2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                circle 300px at var(--x, 50%) var(--y, 50%),
                rgba(30, 150, 140, 0.1),
                transparent 40%
            );
        }

        .glow-layer-3 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(
                circle 150px at var(--x, 50%) var(--y, 50%),
                rgba(255, 255, 255, 0.08),
                transparent 30%
            );
        }

        .login-wrap {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 10;
        }

        .login-card-group {
            position: absolute;
            right: 120px;
            top: 50%;
            transform: translateY(-50%);
            width: 450px;
            padding: 40px;
            background: rgba(64, 224, 208, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(64, 224, 208, 0.3);
            overflow: hidden;
        }

        .login-card-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: radial-gradient(
                400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(30, 150, 140, 0.5),
                transparent 40%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-card-group:hover::before {
            opacity: 1;
        }

        .login-title-main {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 0px;
            line-height: 47.74px;
            color: rgba(30, 100, 100, 1);
            margin-bottom: 12px;
        }

        .login-title-sub {
            font-size: 30px;
            font-weight: 300;
            line-height: 39.78px;
            color: rgba(40, 120, 120, 1);
            margin-bottom: 40px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 300;
            line-height: 21.22px;
            color: rgba(60, 60, 60, 0.85);
            display: block;
            margin-bottom: 8px;
        }

        .login-input {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(64, 224, 208, 0.4);
            border-radius: 5px;
            outline: none;
            padding: 0 16px;
            font-size: 18px;
            color: #333;
            margin-bottom: 24px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .login-input::placeholder {
            color: rgba(60, 60, 60, 0.5);
        }

        .login-input:focus {
            border-color: rgba(30, 150, 140, 0.8);
            box-shadow: 0 0 20px rgba(30, 150, 140, 0.3);
        }

        .form-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .remember-box-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-checkbox {
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(64, 224, 208, 0.4);
            cursor: pointer;
            accent-color: #1e968c;
        }

        .remember-text {
            font-size: 16px;
            color: rgba(60, 60, 60, 0.7);
        }

        .forget-pwd {
            font-size: 16px;
            color: rgba(60, 60, 60, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forget-pwd:hover {
            color: rgba(30, 100, 100, 1);
        }

        .register-link {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: rgba(60, 60, 60, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-link:hover {
            color: rgba(30, 100, 100, 1);
        }

        .login-btn {
            position: relative;
            width: 100%;
            height: 52px;
            border-radius: 5px;
            border: none;
            background: linear-gradient(135deg, #2eb8a8, #40e0d0);
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 255, 255, 0.2),
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #3cc9b8, #50e8d8);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(64, 224, 208, 0.4);
        }

        .cursor-glow {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(30, 150, 140, 1), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        body:hover .cursor-glow {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .login-card-group {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                margin: 50px auto;
                width: 90%;
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="glow-layer-1"></div>
    <div class="glow-layer-2"></div>
    <div class="glow-layer-3"></div>
    <div class="cursor-glow"></div>

    <div class="login-wrap">
        <div class="login-card-group">
            <h1 class="login-title-main">LOG IN TO LEARN TOGETHER</h1>
            <h2 class="login-title-sub">欢迎来到万语集</h2>

            <label class="form-label">手机号/用户名</label>
            <input class="login-input" type="text" placeholder="请输入手机号或者用户名">

            <label class="form-label">登录密码</label>
            <input class="login-input" type="password" placeholder="请输入密码">

            <div class="form-bottom-row">
                <div class="remember-box-wrap">
                    <input type="checkbox" class="remember-checkbox" id="remember">
                    <label class="remember-text" for="remember">记住密码</label>
                </div>
                <a href="#" class="forget-pwd">忘记密码</a>
            </div>

            <button class="login-btn">确认登录</button>

            <a href="register-page.html" class="register-link">没有账号？去注册→</a>
        </div>
    </div>

    <script>
        const glowLayers = document.querySelectorAll('.glow-layer-1, .glow-layer-2, .glow-layer-3');
        const loginCard = document.querySelector('.login-card-group');
        const loginBtn = document.querySelector('.login-btn');
        const cursorGlow = document.querySelector('.cursor-glow');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            glowLayers.forEach(layer => {
                layer.style.setProperty('--x', `${x}px`);
                layer.style.setProperty('--y', `${y}px`);
            });

            cursorGlow.style.left = `${x}px`;
            cursorGlow.style.top = `${y}px`;
        });

        loginCard.addEventListener('mousemove', (e) => {
            const rect = loginCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            loginCard.style.setProperty('--mouse-x', `${x}px`);
            loginCard.style.setProperty('--mouse-y', `${y}px`);
        });

        loginBtn.addEventListener('mousemove', (e) => {
            const rect = loginBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            loginBtn.style.setProperty('--mouse-x', `${x}px`);
            loginBtn.style.setProperty('--mouse-y', `${y}px`);
        });
    </script>
</body>
</html>
