<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万语集 - 听力播放</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --text-color: #fff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.5);
            --navbar-bg: rgba(255, 255, 255, 0.08);
            --navbar-border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover-bg: rgba(255, 255, 255, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-hover-bg: rgba(255, 255, 255, 0.2);
            --glow-color: rgba(30, 150, 140, 0.12);
            --glow-color-2: rgba(30, 150, 140, 0.08);
            --cursor-glow: rgba(30, 150, 140, 1);
            --progress-bg: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #d9e2ec 100%);
            --text-color: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.7);
            --text-tertiary: rgba(26, 26, 46, 0.5);
            --navbar-bg: rgba(255, 255, 255, 0.8);
            --navbar-border: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 0, 0, 0.1);
            --card-hover-bg: rgba(255, 255, 255, 0.95);
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-border: rgba(0, 0, 0, 0.1);
            --btn-hover-bg: rgba(0, 0, 0, 0.1);
            --glow-color: rgba(30, 150, 140, 0.1);
            --glow-color-2: rgba(30, 150, 140, 0.06);
            --cursor-glow: rgba(30, 150, 140, 0.8);
            --progress-bg: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.3s ease;
        }

        .glow-layer-1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                circle 600px at var(--x, 50%) var(--y, 50%),
                var(--glow-color),
                transparent 50%
            );
        }

        .glow-layer-2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(
                circle 300px at var(--x, 50%) var(--y, 50%),
                var(--glow-color-2),
                transparent 40%
            );
        }

        .cursor-glow {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--cursor-glow), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        body:hover .cursor-glow {
            opacity: 1;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--navbar-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--navbar-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #40e0d0, #2eb8a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .navbar-center {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-link {
            font-size: 16px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        .nav-link:hover {
            color: #40e0d0;
        }

        .nav-link.active {
            color: #40e0d0;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #40e0d0, #2eb8a8);
            border-radius: 2px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-btn {
            position: relative;
            width: 40px;
            height: 40px;
            background: var(--btn-bg);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            background: var(--btn-hover-bg);
        }

        .notification-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        .notification-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .user-info:hover {
            background: var(--btn-bg);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #40e0d0, #2eb8a8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
        }

        .user-name {
            font-size: 15px;
            color: var(--text-color);
        }

        .theme-btn {
            padding: 10px 16px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 25px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn:hover {
            background: var(--btn-hover-bg);
        }

        .theme-icon {
            font-size: 18px;
        }

        .main-content {
            position: relative;
            z-index: 10;
            padding-top: 90px;
            padding-bottom: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
        }

        .page-title span {
            color: #40e0d0;
        }

        .player-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .player-main {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .player-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 1px;
            background: radial-gradient(
                400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(64, 224, 208, 0.4),
                transparent 40%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-main:hover::before {
            opacity: 1;
        }

        .upload-section {
            text-align: center;
            padding: 60px 20px;
            border: 2px dashed var(--card-border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-section:hover {
            border-color: #40e0d0;
            background: rgba(64, 224, 208, 0.05);
        }

        .upload-section.has-file {
            border-style: solid;
            border-color: rgba(64, 224, 208, 0.3);
            padding: 30px 20px;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .file-info {
            display: none;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(64, 224, 208, 0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .file-info.show {
            display: flex;
        }

        .file-icon {
            font-size: 32px;
        }

        .file-details {
            flex: 1;
            text-align: left;
        }

        .file-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .file-duration {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .file-remove {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.2);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #ff6b6b;
            transition: all 0.3s ease;
        }

        .file-remove:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .video-container {
            display: none;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }

        .video-container.show {
            display: block;
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        .player-controls {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .player-controls.show {
            display: flex;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time-display {
            font-size: 13px;
            color: var(--text-tertiary);
            min-width: 45px;
        }

        .progress-bar-wrapper {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #40e0d0, #2eb8a8);
            border-radius: 3px;
            width: 0%;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #40e0d0;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar-wrapper:hover .progress-bar-fill::after {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .control-btn.secondary {
            background: var(--btn-bg);
            color: var(--text-secondary);
        }

        .control-btn.secondary:hover {
            background: var(--btn-hover-bg);
            color: var(--text-color);
        }

        .control-btn.primary {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #40e0d0, #2eb8a8);
            color: #fff;
            font-size: 28px;
        }

        .control-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(64, 224, 208, 0.3);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .speed-label {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .speed-btn {
            padding: 6px 12px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 15px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .speed-btn:hover, .speed-btn.active {
            background: rgba(64, 224, 208, 0.2);
            border-color: rgba(64, 224, 208, 0.3);
            color: #40e0d0;
        }

        .subtitle-section {
            margin-top: 30px;
        }

        .subtitle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subtitle-title {
            font-size: 16px;
            font-weight: 600;
        }

        .subtitle-actions {
            display: flex;
            gap: 10px;
        }

        .subtitle-action-btn {
            padding: 6px 14px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 15px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subtitle-action-btn:hover {
            background: var(--btn-hover-bg);
        }

        .subtitle-display {
            background: var(--btn-bg);
            border-radius: 16px;
            padding: 25px 30px;
            min-height: 120px;
            text-align: center;
            position: relative;
        }

        .subtitle-text {
            font-size: 20px;
            line-height: 1.8;
            color: var(--text-color);
        }

        .subtitle-text .word {
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .subtitle-text .word:hover {
            background: rgba(64, 224, 208, 0.2);
            color: #40e0d0;
        }

        .subtitle-text .word.active {
            background: rgba(64, 224, 208, 0.3);
            color: #40e0d0;
        }

        .subtitle-placeholder {
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .subtitle-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .subtitle-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subtitle-item:hover {
            background: var(--btn-bg);
        }

        .subtitle-item.active {
            background: rgba(64, 224, 208, 0.15);
        }

        .subtitle-time {
            font-size: 13px;
            color: var(--text-tertiary);
            min-width: 50px;
            padding-top: 3px;
        }

        .subtitle-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.6;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .word-popup {
            display: none;
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .word-popup.show {
            display: block;
        }

        .word-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .word-popup-word {
            font-size: 22px;
            font-weight: 600;
        }

        .word-popup-phonetic {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        .word-popup-meaning {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .word-popup-actions {
            display: flex;
            gap: 10px;
        }

        .word-popup-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .word-popup-btn.primary {
            background: linear-gradient(135deg, #40e0d0, #2eb8a8);
            border: none;
            color: #fff;
        }

        .word-popup-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(64, 224, 208, 0.3);
        }

        .word-popup-btn.secondary {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-color);
        }

        .word-popup-btn.secondary:hover {
            background: var(--btn-hover-bg);
        }

        .word-popup-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-tertiary);
            transition: all 0.3s ease;
        }

        .word-popup-close:hover {
            background: var(--btn-hover-bg);
            color: var(--text-color);
        }

        .vocab-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .vocab-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--btn-bg);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .vocab-item:hover {
            background: var(--btn-hover-bg);
        }

        .vocab-item-word {
            font-size: 15px;
            font-weight: 500;
        }

        .vocab-item-meaning {
            flex: 1;
            font-size: 13px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .vocab-item-action {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .vocab-item-action:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-text {
            font-size: 14px;
        }

        .subtitle-upload {
            margin-top: 15px;
        }

        .subtitle-upload-btn {
            width: 100%;
            padding: 12px;
            background: var(--btn-bg);
            border: 1px dashed var(--card-border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subtitle-upload-btn:hover {
            border-color: #40e0d0;
            background: rgba(64, 224, 208, 0.05);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(64, 224, 208, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 1024px) {
            .player-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .navbar-center {
                display: none;
            }

            .container {
                padding: 0 20px;
            }

            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .control-btn.primary {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="glow-layer-1"></div>
    <div class="glow-layer-2"></div>
    <div class="cursor-glow"></div>

    <nav class="navbar">
        <div class="navbar-logo" onclick="location.href='index.html'">万语集</div>
        
        <div class="navbar-center">
            <a href="index.html" class="nav-link">首页</a>
            <a href="learning.html" class="nav-link">语言学习</a>
            <a href="vocabulary.html" class="nav-link">词库</a>
        </div>

        <div class="navbar-right">
            <button class="notification-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
                </svg>
                <span class="notification-badge"></span>
            </button>
            
            <div class="user-info" onclick="location.href='profile.html'">
                <div class="user-avatar">U</div>
                <span class="user-name" id="navUserName">用户昵称</span>
            </div>
            
            <button class="theme-btn" onclick="toggleTheme()">
                <span class="theme-icon" id="themeIcon">🌙</span>
            </button>
            
            <button class="theme-btn" onclick="openSkinModal()">
                <span>换肤</span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title"><span>🎧</span> 听力播放</h1>
            </div>

            <div class="player-container">
                <div class="player-main" id="playerMain">
                    <div class="upload-section" id="uploadSection" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">🎵</div>
                        <div class="upload-text">点击上传音频或视频文件</div>
                        <div class="upload-hint">支持 MP3, MP4, WAV, M4A 等格式</div>
                    </div>
                    <input type="file" id="fileInput" accept="audio/*,video/*" style="display: none" onchange="handleFileSelect(event)">

                    <div class="file-info" id="fileInfo">
                        <div class="file-icon">🎵</div>
                        <div class="file-details">
                            <div class="file-name" id="fileName">文件名</div>
                            <div class="file-duration" id="fileDuration">时长</div>
                        </div>
                        <button class="file-remove" onclick="removeFile()">✕</button>
                    </div>

                    <div class="video-container" id="videoContainer">
                        <video id="videoPlayer"></video>
                    </div>

                    <audio id="audioPlayer" style="display: none;"></audio>

                    <div class="player-controls" id="playerControls">
                        <div class="progress-section">
                            <span class="time-display" id="currentTime">0:00</span>
                            <div class="progress-bar-wrapper" id="progressBar" onclick="seekTo(event)">
                                <div class="progress-bar-fill" id="progressFill"></div>
                            </div>
                            <span class="time-display" id="totalTime">0:00</span>
                        </div>

                        <div class="control-buttons">
                            <button class="control-btn secondary" onclick="skipBackward()" title="后退10秒">⏪</button>
                            <button class="control-btn secondary" onclick="previousSubtitle()" title="上一句">⏮️</button>
                            <button class="control-btn primary" onclick="togglePlay()" id="playBtn">▶️</button>
                            <button class="control-btn secondary" onclick="nextSubtitle()" title="下一句">⏭️</button>
                            <button class="control-btn secondary" onclick="skipForward()" title="前进10秒">⏩</button>
                        </div>

                        <div class="speed-control">
                            <span class="speed-label">播放速度：</span>
                            <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                            <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                            <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
                            <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                            <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                        </div>
                    </div>

                    <div class="subtitle-section">
                        <div class="subtitle-header">
                            <h3 class="subtitle-title">📝 字幕</h3>
                            <div class="subtitle-actions">
                                <button class="subtitle-action-btn" onclick="document.getElementById('subtitleInput').click()">导入字幕</button>
                                <input type="file" id="subtitleInput" accept=".srt,.vtt,.txt" style="display: none" onchange="handleSubtitleSelect(event)">
                                <button class="subtitle-action-btn" onclick="toggleSubtitleList()">字幕列表</button>
                            </div>
                        </div>

                        <div class="subtitle-display" id="subtitleDisplay">
                            <div class="subtitle-text" id="subtitleText">
                                <span class="subtitle-placeholder">上传文件后，字幕将在此显示</span>
                            </div>
                        </div>

                        <div class="subtitle-list" id="subtitleList" style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="sidebar-card">
                        <h3 class="sidebar-title">📖 生词本</h3>
                        <div class="vocab-list" id="vocabList">
                            <div class="empty-state">
                                <div class="empty-icon">📚</div>
                                <div class="empty-text">点击字幕中的单词<br>即可添加到生词本</div>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-card">
                        <h3 class="sidebar-title">💡 使用提示</h3>
                        <div style="font-size: 14px; color: var(--text-tertiary); line-height: 1.8;">
                            <p>• 点击字幕中的单词可查看翻译</p>
                            <p>• 双击单词可添加到生词本</p>
                            <p>• 支持导入 SRT、VTT 字幕文件</p>
                            <p>• 可调整播放速度练习听力</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="word-popup" id="wordPopup">
        <button class="word-popup-close" onclick="closeWordPopup()">✕</button>
        <div class="word-popup-header">
            <div>
                <div class="word-popup-word" id="popupWord">word</div>
                <div class="word-popup-phonetic" id="popupPhonetic">/wɜːrd/</div>
            </div>
        </div>
        <div class="word-popup-meaning" id="popupMeaning">单词释义</div>
        <div class="word-popup-actions">
            <button class="word-popup-btn secondary" onclick="speakWord()">
                🔊 发音
            </button>
            <button class="word-popup-btn primary" onclick="addToVocab()">
                📚 加入生词本
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const glowLayers = document.querySelectorAll('.glow-layer-1, .glow-layer-2');
        const cursorGlow = document.querySelector('.cursor-glow');
        const playerMain = document.getElementById('playerMain');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            glowLayers.forEach(layer => {
                layer.style.setProperty('--x', `${x}px`);
                layer.style.setProperty('--y', `${y}px`);
            });

            cursorGlow.style.left = `${x}px`;
            cursorGlow.style.top = `${y}px`;
        });

        playerMain.addEventListener('mousemove', (e) => {
            const rect = playerMain.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            playerMain.style.setProperty('--mouse-x', `${x}px`);
            playerMain.style.setProperty('--mouse-y', `${y}px`);
        });

        let currentFile = null;
        let subtitles = [];
        let currentSubtitleIndex = -1;
        let isPlaying = false;
        let currentWord = '';
        let vocabList = [];

        const audioPlayer = document.getElementById('audioPlayer');
        const videoPlayer = document.getElementById('videoPlayer');
        let currentPlayer = audioPlayer;

        const sampleSubtitles = [
            { start: 0, end: 3, text: "Hello, welcome to our language learning program." },
            { start: 3, end: 6, text: "Today we will learn some common English phrases." },
            { start: 6, end: 10, text: "Let's start with basic greetings and introductions." },
            { start: 10, end: 14, text: "When you meet someone for the first time," },
            { start: 14, end: 17, text: "you can say 'Nice to meet you'." },
            { start: 17, end: 21, text: "This is a polite and friendly expression." },
            { start: 21, end: 25, text: "Practice makes perfect, so keep learning!" }
        ];

        function initializePage() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }

            const savedVocab = localStorage.getItem('vocabList');
            if (savedVocab) {
                vocabList = JSON.parse(savedVocab);
                renderVocabList();
            }

            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('loadedmetadata', onMediaLoaded);
            audioPlayer.addEventListener('ended', onMediaEnded);

            videoPlayer.addEventListener('timeupdate', updateProgress);
            videoPlayer.addEventListener('loadedmetadata', onMediaLoaded);
            videoPlayer.addEventListener('ended', onMediaEnded);
        }

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function openSkinModal() {
            alert('换肤功能即将上线，敬请期待！');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                currentFile = file;
                const url = URL.createObjectURL(file);
                
                const isVideo = file.type.startsWith('video');
                
                if (isVideo) {
                    videoPlayer.src = url;
                    currentPlayer = videoPlayer;
                    document.getElementById('videoContainer').classList.add('show');
                } else {
                    audioPlayer.src = url;
                    currentPlayer = audioPlayer;
                    document.getElementById('videoContainer').classList.remove('show');
                }

                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('fileInfo').classList.add('show');
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('playerControls').classList.add('show');

                subtitles = sampleSubtitles;
                renderSubtitleList();
            }
        }

        function removeFile() {
            currentFile = null;
            audioPlayer.src = '';
            videoPlayer.src = '';
            currentPlayer = audioPlayer;
            
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInfo').classList.remove('show');
            document.getElementById('videoContainer').classList.remove('show');
            document.getElementById('playerControls').classList.remove('show');
            document.getElementById('subtitleText').innerHTML = '<span class="subtitle-placeholder">上传文件后，字幕将在此显示</span>';
            document.getElementById('subtitleList').innerHTML = '';
            
            subtitles = [];
            currentSubtitleIndex = -1;
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶️';
        }

        function onMediaLoaded() {
            const duration = currentPlayer.duration;
            document.getElementById('totalTime').textContent = formatTime(duration);
            document.getElementById('fileDuration').textContent = formatTime(duration);
        }

        function onMediaEnded() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶️';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const currentTime = currentPlayer.currentTime;
            const duration = currentPlayer.duration;
            
            document.getElementById('currentTime').textContent = formatTime(currentTime);
            
            const progress = (currentTime / duration) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;

            updateSubtitle(currentTime);
        }

        function updateSubtitle(currentTime) {
            let foundIndex = -1;
            
            for (let i = 0; i < subtitles.length; i++) {
                if (currentTime >= subtitles[i].start && currentTime < subtitles[i].end) {
                    foundIndex = i;
                    break;
                }
            }

            if (foundIndex !== currentSubtitleIndex) {
                currentSubtitleIndex = foundIndex;
                
                if (foundIndex >= 0) {
                    const subtitle = subtitles[foundIndex];
                    const words = subtitle.text.split(' ');
                    const html = words.map(word => 
                        `<span class="word" onclick="showWordPopup(event, '${word.replace(/[^a-zA-Z]/g, '')}')">${word}</span>`
                    ).join(' ');
                    document.getElementById('subtitleText').innerHTML = html;
                    
                    document.querySelectorAll('.subtitle-item').forEach((item, index) => {
                        item.classList.toggle('active', index === foundIndex);
                    });
                } else {
                    document.getElementById('subtitleText').innerHTML = '<span class="subtitle-placeholder">...</span>';
                }
            }
        }

        function togglePlay() {
            if (isPlaying) {
                currentPlayer.pause();
                document.getElementById('playBtn').textContent = '▶️';
            } else {
                currentPlayer.play();
                document.getElementById('playBtn').textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        }

        function seekTo(event) {
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percentage = x / rect.width;
            currentPlayer.currentTime = percentage * currentPlayer.duration;
        }

        function skipBackward() {
            currentPlayer.currentTime = Math.max(0, currentPlayer.currentTime - 10);
        }

        function skipForward() {
            currentPlayer.currentTime = Math.min(currentPlayer.duration, currentPlayer.currentTime + 10);
        }

        function previousSubtitle() {
            if (currentSubtitleIndex > 0) {
                currentPlayer.currentTime = subtitles[currentSubtitleIndex - 1].start;
            }
        }

        function nextSubtitle() {
            if (currentSubtitleIndex < subtitles.length - 1) {
                currentPlayer.currentTime = subtitles[currentSubtitleIndex + 1].start;
            }
        }

        function setSpeed(speed) {
            currentPlayer.playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function handleSubtitleSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    parseSubtitle(content, file.name);
                };
                reader.readAsText(file);
            }
        }

        function parseSubtitle(content, filename) {
            subtitles = [];
            
            if (filename.endsWith('.srt')) {
                const blocks = content.trim().split(/\n\n+/);
                blocks.forEach(block => {
                    const lines = block.split('\n');
                    if (lines.length >= 3) {
                        const timeMatch = lines[1].match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
                        if (timeMatch) {
                            const start = parseInt(timeMatch[1]) * 3600 + parseInt(timeMatch[2]) * 60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4]) / 1000;
                            const end = parseInt(timeMatch[5]) * 3600 + parseInt(timeMatch[6]) * 60 + parseInt(timeMatch[7]) + parseInt(timeMatch[8]) / 1000;
                            const text = lines.slice(2).join(' ');
                            subtitles.push({ start, end, text });
                        }
                    }
                });
            } else if (filename.endsWith('.vtt')) {
                const lines = content.split('\n');
                let i = 0;
                while (i < lines.length) {
                    if (lines[i].includes('-->')) {
                        const timeMatch = lines[i].match(/(\d{2}):(\d{2}):(\d{2})\.(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})\.(\d{3})/);
                        if (timeMatch) {
                            const start = parseInt(timeMatch[1]) * 3600 + parseInt(timeMatch[2]) * 60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4]) / 1000;
                            const end = parseInt(timeMatch[5]) * 3600 + parseInt(timeMatch[6]) * 60 + parseInt(timeMatch[7]) + parseInt(timeMatch[8]) / 1000;
                            let text = '';
                            i++;
                            while (i < lines.length && lines[i].trim() !== '') {
                                text += (text ? ' ' : '') + lines[i].trim();
                                i++;
                            }
                            subtitles.push({ start, end, text });
                        }
                    }
                    i++;
                }
            } else {
                const lines = content.split('\n');
                let time = 0;
                lines.forEach(line => {
                    if (line.trim()) {
                        subtitles.push({ start: time, end: time + 3, text: line.trim() });
                        time += 3;
                    }
                });
            }

            renderSubtitleList();
            showToast('字幕导入成功！');
        }

        function renderSubtitleList() {
            const container = document.getElementById('subtitleList');
            container.innerHTML = subtitles.map((sub, index) => `
                <div class="subtitle-item ${index === currentSubtitleIndex ? 'active' : ''}" onclick="jumpToSubtitle(${index})">
                    <span class="subtitle-time">${formatTime(sub.start)}</span>
                    <span class="subtitle-content">${sub.text}</span>
                </div>
            `).join('');
        }

        function toggleSubtitleList() {
            const list = document.getElementById('subtitleList');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
        }

        function jumpToSubtitle(index) {
            if (subtitles[index]) {
                currentPlayer.currentTime = subtitles[index].start;
            }
        }

        function showWordPopup(event, word) {
            event.stopPropagation();
            currentWord = word;
            
            const popup = document.getElementById('wordPopup');
            const rect = event.target.getBoundingClientRect();
            
            popup.style.left = `${rect.left}px`;
            popup.style.top = `${rect.bottom + 10}px`;
            
            document.getElementById('popupWord').textContent = word;
            document.getElementById('popupPhonetic').textContent = `/${word}/`;
            document.getElementById('popupMeaning').textContent = '点击"加入生词本"保存此单词，后续可查看详细释义。';
            
            popup.classList.add('show');

            document.addEventListener('click', closeWordPopupOutside);
        }

        function closeWordPopup() {
            document.getElementById('wordPopup').classList.remove('show');
            document.removeEventListener('click', closeWordPopupOutside);
        }

        function closeWordPopupOutside(event) {
            const popup = document.getElementById('wordPopup');
            if (!popup.contains(event.target) && !event.target.classList.contains('word')) {
                closeWordPopup();
            }
        }

        function speakWord() {
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        function addToVocab() {
            if (!currentWord) return;
            
            const exists = vocabList.find(v => v.word === currentWord);
            if (exists) {
                showToast('该单词已在生词本中');
                return;
            }

            vocabList.push({
                word: currentWord,
                phonetic: `/${currentWord}/`,
                meaning: '待补充释义',
                addedAt: Date.now()
            });

            localStorage.setItem('vocabList', JSON.stringify(vocabList));
            renderVocabList();
            closeWordPopup();
            showToast(`"${currentWord}" 已加入生词本`);
        }

        function renderVocabList() {
            const container = document.getElementById('vocabList');
            
            if (vocabList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <div class="empty-text">点击字幕中的单词<br>即可添加到生词本</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = vocabList.map((item, index) => `
                <div class="vocab-item">
                    <div>
                        <div class="vocab-item-word">${item.word}</div>
                        <div class="vocab-item-meaning">${item.meaning}</div>
                    </div>
                    <button class="vocab-item-action" onclick="removeFromVocab(${index})">🗑️</button>
                </div>
            `).join('');
        }

        function removeFromVocab(index) {
            vocabList.splice(index, 1);
            localStorage.setItem('vocabList', JSON.stringify(vocabList));
            renderVocabList();
            showToast('已从生词本移除');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        initializePage();
    </script>
</body>
